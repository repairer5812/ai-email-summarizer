name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pyinstaller

      - name: Verify pydantic runtime pair
        run: |
          python -c "import pydantic, pydantic_core; print('pydantic', pydantic.__version__); print('pydantic_core', pydantic_core.__version__)"

      - name: Verify embedded tray icon decodes
        # Catches base64 corruption (manual edit gone wrong, encoding issue,
        # accidental whitespace) in src/webmail_summary/ui/tray_icon_data.py
        # at dev-side time, before we spend 3 minutes building an EXE that
        # would silently ship a broken tray icon. The tray icon lives in
        # source as base64 (not as a bundled file) specifically to bypass
        # external AV interference with PyInstaller _MEI extraction, so the
        # source itself must always be a valid PNG.
        run: |
          python -c "from webmail_summary.ui.tray_icon_data import TRAY_ICON_PNG_BASE64; from base64 import b64decode; from io import BytesIO; from PIL import Image; data = b64decode(TRAY_ICON_PNG_BASE64); img = Image.open(BytesIO(data)); assert img.size[0] >= 16 and img.size[1] >= 16, f'tray icon too small: {img.size}'; print(f'embedded tray icon OK: size={img.size}, mode={img.mode}, raw_bytes={len(data)}, b64_chars={len(TRAY_ICON_PNG_BASE64)}')"


      - name: Build executable
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          Set-Content -Path src/webmail_summary/_version.txt -Value $ver -Encoding ascii
          $parts = $ver.Split('.')
          if ($parts.Length -lt 3) { throw "Version must be in form X.Y.Z or X.Y.Z.W (got: $ver)" }
          # Pad to 4 parts for Windows version info (X.Y.Z.W)
          while ($parts.Length -lt 4) { $parts += '0' }
          $v4 = "$($parts[0]).$($parts[1]).$($parts[2]).$($parts[3])"
          $versionInfoLines = @(
            '# UTF-8',
            'VSVersionInfo(',
            '  ffi=FixedFileInfo(',
            "    filevers=($($parts[0]), $($parts[1]), $($parts[2]), $($parts[3])),",
            "    prodvers=($($parts[0]), $($parts[1]), $($parts[2]), $($parts[3])),", 
            '    mask=0x3f,',
            '    flags=0x0,',
            '    OS=0x4,',
            '    fileType=0x1,',
            '    subtype=0x0,',
            '    date=(0, 0)',
            '  ),',
            '  kids=[',
            '    StringFileInfo(',
            '      [',
            '        StringTable(',
            "          '040904B0',",
            '          [',
            "            StringStruct('CompanyName', 'webmail-summary'),",
            "            StringStruct('FileDescription', 'webmail-summary'),",
            "            StringStruct('FileVersion', '$v4'),",
            "            StringStruct('InternalName', 'webmail-summary'),",
            "            StringStruct('OriginalFilename', 'webmail-summary.exe'),",
            "            StringStruct('ProductName', 'webmail-summary'),",
            "            StringStruct('ProductVersion', '$v4')",
            '          ]',
            '        )',
            '      ]',
            '    ),',
            '    VarFileInfo([VarStruct(''Translation'', [1033, 1200])])',
            '  ]',
            ')'
          )
          Set-Content -Path version_info.txt -Value $versionInfoLines -Encoding utf8
          # --add-data for static/ and templates/ explicitly: --collect-data
          # was observed to silently drop app-icon.png (a 6 MB PNG used by
          # the tray icon) on at least one user's build, even though smaller
          # files in the same folder were included. Belt-and-suspenders with
          # explicit add-data avoids relying on PyInstaller heuristics.
          pyinstaller --noconfirm --clean --onefile --noconsole --name webmail-summary --icon landing/app/favicon.ico --version-file version_info.txt --collect-data webmail_summary --collect-data certifi --collect-submodules webmail_summary --collect-submodules pystray --collect-submodules PIL --add-data "src/webmail_summary/ui/static;webmail_summary/ui/static" --add-data "src/webmail_summary/ui/templates;webmail_summary/ui/templates" --runtime-hook installer/pyinstaller_rth_cffi.py --hidden-import webview --hidden-import pystray --hidden-import pystray._win32 --hidden-import PIL --hidden-import PIL.Image --hidden-import _cffi_backend src/webmail_summary/cli.py

      - name: Smoke test — frozen launcher publishes active_url.txt
        shell: pwsh
        # Catches regressions that only manifest in PyInstaller --onefile
        # builds, which dev mode (python -m) cannot reproduce. Specifically
        # the launcher → server handshake: server_proc.pid is the bootstrap
        # EXE's PID, not os.getpid() inside the server child, so any PID-
        # equality handshake will silently deadlock here. Failing the build
        # at this step prevents a broken release from reaching users.
        run: |
          $smokeRoot = "$pwd\smoketest"
          $localAppData = "$smokeRoot\LocalAppData"
          $appData = "$smokeRoot\AppData"
          New-Item -ItemType Directory -Force -Path $localAppData | Out-Null
          New-Item -ItemType Directory -Force -Path $appData | Out-Null
          $env:LOCALAPPDATA = $localAppData
          $env:APPDATA = $appData
          $urlFile = "$localAppData\WebmailSummary\active_url.txt"
          Write-Host "Launching dist\webmail-summary.exe (LOCALAPPDATA=$localAppData)"
          $proc = Start-Process -FilePath "dist\webmail-summary.exe" -PassThru -WindowStyle Hidden
          try {
            $found = $false
            $content = ""
            for ($i = 0; $i -lt 60; $i++) {
              Start-Sleep -Seconds 1
              if (Test-Path $urlFile) {
                $content = (Get-Content $urlFile -Raw).Trim()
                if ($content -match "^https?://") {
                  Write-Host "active_url.txt appeared after $($i + 1)s:"
                  Write-Host $content
                  $found = $true
                  break
                }
              }
            }
            if (-not $found) {
              Write-Host "##[error]active_url.txt did not appear within 60s"
              Write-Host "This typically means the launcher → server handshake is broken"
              Write-Host "in the frozen build (e.g. PID-based handshake under --onefile)."
              if (Test-Path "$localAppData\WebmailSummary\logs\server.log") {
                Write-Host "--- server.log tail ---"
                Get-Content "$localAppData\WebmailSummary\logs\server.log" -Tail 30
              }
              if (Test-Path "$localAppData\WebmailSummary\logs\ui_start.log") {
                Write-Host "--- ui_start.log tail ---"
                Get-Content "$localAppData\WebmailSummary\logs\ui_start.log" -Tail 50
              }
              exit 1
            }
            # Verify static assets (especially the tray-icon PNG) are
            # actually bundled and served. PyInstaller can silently drop
            # package data files; this assertion catches that class of
            # regression before it reaches users.
            # NB: active_url.txt is multi-line (url\npid\nhandshake), so
            # take only the first line for the base URL.
            $urlOnly = ($content -split "`r?`n")[0].Trim().TrimEnd('/')
            $iconUrl = "$urlOnly/static/app-icon.png"
            Write-Host "Verifying tray icon asset: $iconUrl"
            try {
              $resp = Invoke-WebRequest -Uri $iconUrl -UseBasicParsing -TimeoutSec 10
              if ($resp.StatusCode -ne 200) {
                Write-Host "##[error]GET $iconUrl returned $($resp.StatusCode), expected 200"
                exit 1
              }
              if ($resp.RawContentLength -lt 1024) {
                Write-Host "##[error]app-icon.png response too small ($($resp.RawContentLength) bytes) — bundled file likely corrupt"
                exit 1
              }
              Write-Host "Tray icon asset served OK ($($resp.RawContentLength) bytes)"
            } catch {
              Write-Host "##[error]Could not fetch app-icon.png: $_"
              Write-Host "Tray icon will not render in production. Aborting release."
              exit 1
            }
            # Verify the embedded tray icon in PYZ archive is loaded
            # correctly by the frozen launcher. In headless CI the launcher
            # falls back to browser mode (no .NET runtime), which invokes
            # _run_fallback_tray() → _load_tray_image() → decodes the
            # embedded base64. Give the launcher a few seconds to reach that
            # call site, then assert ui_start.log shows no _load_tray_image
            # failure. Earlier stages of tray init may still fail in headless
            # CI (e.g. icon.run() needs a Windows shell session) — that's
            # fine; we only care that the *image data* loads.
            Start-Sleep -Seconds 5
            $uiLog = "$localAppData\WebmailSummary\logs\ui_start.log"
            if (Test-Path $uiLog) {
              $failures = Select-String -Path $uiLog -Pattern "_load_tray_image failed" -SimpleMatch
              if ($failures) {
                Write-Host "##[error]Embedded tray icon failed to load in frozen build:"
                $failures | ForEach-Object { Write-Host "  $($_.Line)" }
                Write-Host "--- ui_start.log tail ---"
                Get-Content $uiLog -Tail 30
                exit 1
              }
              Write-Host "Embedded tray icon decoded by launcher: no failures in ui_start.log"
            } else {
              Write-Host "##[warning]ui_start.log not present yet — launcher may not have reached fallback tray; not failing build"
            }
          } finally {
            Get-Process webmail-summary -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { throw "ISCC not found at $iscc" }
          & $iscc /O"release" /F"webmail-summary-setup-windows-x64" /DMyAppVersion=$ver "installer\webmail-summary.iss"

      - name: Prepare unsigned bundle (for optional signing)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path unsigned | Out-Null
          Copy-Item dist/webmail-summary.exe unsigned/webmail-summary.exe
          Copy-Item release/webmail-summary-setup-windows-x64.exe unsigned/webmail-summary-setup-windows-x64.exe

      - name: Upload unsigned artifacts (for SignPath)
        id: upload_unsigned
        uses: actions/upload-artifact@v6
        with:
          name: unsigned-windows
          if-no-files-found: error
          path: |
            unsigned/webmail-summary.exe
            unsigned/webmail-summary-setup-windows-x64.exe

      - name: Sign with SignPath (optional)
        id: signpath
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        continue-on-error: true
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload_unsigned.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600
          output-artifact-directory: signed

      - name: Prepare artifacts
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $installerName = "webmail-summary-setup-windows-x64-v$ver.exe"
          $signedPortable = Get-ChildItem -Path signed -Recurse -File -Filter webmail-summary.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $signedPortable) {
            Copy-Item $signedPortable.FullName release/webmail-summary.exe -Force
          } else {
            Copy-Item unsigned/webmail-summary.exe release/webmail-summary.exe -Force
          }

          $signedInstaller = Get-ChildItem -Path signed -Recurse -File -Filter webmail-summary-setup-windows-x64.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $signedInstaller) {
            Copy-Item $signedInstaller.FullName ("release/" + $installerName) -Force
          } else {
            Copy-Item unsigned/webmail-summary-setup-windows-x64.exe ("release/" + $installerName) -Force
          }
          Compress-Archive -Path release/webmail-summary.exe -DestinationPath release/webmail-summary-windows-x64.zip -Force
          Get-FileHash release/webmail-summary.exe -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  webmail-summary.exe" } | Out-File release/SHA256SUMS.txt -Encoding ascii
          Get-FileHash ("release/" + $installerName) -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  $installerName" } | Add-Content release/SHA256SUMS.txt
          Get-FileHash release/webmail-summary-windows-x64.zip -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  webmail-summary-windows-x64.zip" } | Add-Content release/SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/webmail-summary.exe
            release/webmail-summary-setup-windows-x64-v*.exe
            release/webmail-summary-windows-x64.zip
            release/SHA256SUMS.txt
          generate_release_notes: true
