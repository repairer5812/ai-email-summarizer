name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Verify pydantic runtime pair
        run: |
          python -c "import pydantic, pydantic_core; print('pydantic', pydantic.__version__); print('pydantic_core', pydantic_core.__version__)"


      - name: Syntax check
        run: |
          python -m compileall src
