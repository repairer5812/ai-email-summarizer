<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="Pretendard, 'Segoe UI', 'Malgun Gothic', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f7"/><stop offset="1" stop-color="#eef1f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.9" cy="-0.1" r="0.7">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.16"/>
      <stop offset="0.65" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fbfcff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .name{font-size:15px;font-weight:800;fill:#0f172a}
      .sub{font-size:11px;fill:#64748b}
      .nav{font-size:13px;font-weight:700;fill:#64748b}
      .muted{font-size:12px;fill:#64748b}
      .h1{font-size:25px;font-weight:800;fill:#0f172a}
      .ctitle{font-size:14px;font-weight:800;fill:#0f172a}
      .core{font-size:13.5px;fill:#0f172a}
      .h3{font-size:13px;font-weight:900;fill:#4f46e5}
      .item{font-size:13px;fill:#0f172a}
      .bullet{fill:#4f46e5}
      .chip{font-size:11px;font-weight:700;fill:#475569}
      .chipa{font-size:11px;font-weight:700;fill:#4f46e5}
      .btns{font-size:11px;font-weight:800;fill:#0f172a}
      .btnp{font-size:11px;font-weight:800;fill:#ffffff}
      .efield{font-size:11.5px;fill:#64748b}
      .eval{font-size:11.5px;font-weight:700;fill:#0f172a}
      .ebody{font-size:12.5px;fill:#334155}
    </style>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>

  <!-- Topbar -->
  <g filter="url(#shadow)"><rect x="24" y="20" width="1152" height="60" rx="22" fill="url(#card)" stroke="#e7ebf3"/></g>
  <rect x="44" y="29" width="42" height="42" rx="14" fill="url(#brand)"/>
  <text x="65" y="56" text-anchor="middle" font-size="20" font-weight="900" fill="#ffffff">W</text>
  <text x="98" y="45" class="name">웹메일 요약</text>
  <text x="98" y="63" class="sub">로컬 메일 아카이브 + Obsidian 내보내기</text>
  <text x="858" y="55" class="nav">대시보드</text>
  <text x="946" y="55" class="nav">설정</text>
  <text x="1000" y="55" class="nav">개발자정보</text>
  <text x="1152" y="55" text-anchor="end" class="nav">English</text>

  <!-- Hero -->
  <text x="44" y="116" class="muted">2026-06-22 (월) 09:14</text>
  <text x="44" y="150" class="h1">[학회] 2026 한국정보과학회 추계학술대회 논문 모집</text>
  <text x="44" y="176" class="muted" font-size="12.5">요약됨 · 1.4s · 2026-06-22 09:15</text>
  <rect x="1084" y="120" width="88" height="32" rx="11" fill="#ffffff" stroke="#e7ebf3"/>
  <text x="1128" y="141" text-anchor="middle" class="btns">뒤로</text>
  <!-- chips -->
  <rect x="44" y="196" width="62" height="26" rx="13" fill="#ffffff" stroke="#e7ebf3"/><text x="75" y="213" text-anchor="middle" class="chip">#학회</text>
  <rect x="114" y="196" width="76" height="26" rx="13" fill="#ffffff" stroke="#e7ebf3"/><text x="152" y="213" text-anchor="middle" class="chip">#논문마감</text>
  <rect x="198" y="196" width="56" height="26" rx="13" fill="#ffffff" stroke="#e7ebf3"/><text x="226" y="213" text-anchor="middle" class="chip">#일정</text>
  <rect x="262" y="196" width="96" height="26" rx="13" fill="#ffffff" stroke="#4f46e5"/><text x="310" y="213" text-anchor="middle" class="chipa">[[학술대회]]</text>
  <rect x="366" y="196" width="96" height="26" rx="13" fill="#ffffff" stroke="#4f46e5"/><text x="414" y="213" text-anchor="middle" class="chipa">[[논문제출]]</text>

  <!-- Left card: summary -->
  <g filter="url(#shadow)"><rect x="24" y="248" width="566" height="600" rx="28" fill="url(#card)" stroke="#e7ebf3"/></g>
  <text x="48" y="288" class="ctitle">핵심 요약 / 상세 요약</text>
  <rect x="48" y="304" width="518" height="74" rx="12" fill="#f3f6fa"/>
  <rect x="48" y="304" width="3" height="74" fill="#4f46e5"/>
  <text x="68" y="332" class="core">추계학술대회 논문 초록 마감은 6/30 18:00이며,</text>
  <text x="68" y="354" class="core">정식 논문 제출은 8/15까지 진행됩니다.</text>
  <text x="48" y="412" class="h3">상세 요약</text>
  <text class="bullet" x="48" y="442">•</text><text x="64" y="442" class="item">발표 분야: 자연어처리(NLP), 컴퓨터비전, 데이터마이닝</text>
  <text class="bullet" x="48" y="470">•</text><text x="64" y="470" class="item">제출은 온라인 시스템에서 진행, LaTeX·HWP 양식 첨부</text>
  <text class="bullet" x="48" y="498">•</text><text x="64" y="498" class="item">우수 논문은 학회지 특별호 게재 기회 제공</text>
  <text class="bullet" x="48" y="526">•</text><text x="64" y="526" class="item">사전등록 할인 등록비는 7/31까지 적용</text>
  <text x="48" y="572" class="h3">주요 일정</text>
  <text class="bullet" x="48" y="602">•</text><text x="64" y="602" class="item">초록 제출 마감: 6/30 (월) 18:00</text>
  <text class="bullet" x="48" y="630">•</text><text x="64" y="630" class="item">정식 논문 마감: 8/15 (금)</text>
  <text class="bullet" x="48" y="658">•</text><text x="64" y="658" class="item">사전등록 마감: 7/31 (목)</text>
  <text class="bullet" x="48" y="686">•</text><text x="64" y="686" class="item">학술대회: 10/23 (목) ~ 10/25 (토), 부산 BEXCO</text>
  <text x="48" y="744" class="muted">요약 모델: 로컬 LLM · 메일 원문은 내 PC에만 저장됩니다.</text>
  <rect x="48" y="768" width="518" height="1" fill="#e7ebf3"/>
  <text x="48" y="800" class="muted">처리 시간 1.4s · 토큰 1,182 · Obsidian 노트로 내보내기 완료</text>

  <!-- Right card: original -->
  <g filter="url(#shadow)"><rect x="610" y="248" width="566" height="600" rx="28" fill="url(#card)" stroke="#e7ebf3"/></g>
  <text x="634" y="288" class="ctitle">원문</text>
  <rect x="1024" y="268" width="128" height="28" rx="9" fill="#ffffff" stroke="#e7ebf3"/>
  <text x="1088" y="286" text-anchor="middle" class="btns">이메일 원본 보기</text>
  <!-- rendered email panel -->
  <rect x="634" y="306" width="518" height="518" rx="14" fill="#ffffff" stroke="#eef1f7"/>
  <text x="654" y="338" class="efield">보낸사람</text><text x="730" y="338" class="eval">한국정보과학회 사무국 &lt;office@society.example.or.kr&gt;</text>
  <text x="654" y="362" class="efield">받는사람</text><text x="730" y="362" class="eval">나</text>
  <text x="654" y="386" class="efield">날짜</text><text x="730" y="386" class="eval">2026-06-22 (월) 09:14</text>
  <line x1="654" y1="404" x2="1132" y2="404" stroke="#eef1f7"/>
  <text x="654" y="436" font-size="15" font-weight="800" fill="#0f172a">2026 추계학술대회 논문 모집 안내</text>
  <text x="654" y="468" class="ebody">안녕하세요, 한국정보과학회 사무국입니다.</text>
  <text x="654" y="492" class="ebody">2026년 추계학술대회 논문을 아래와 같이 모집하오니</text>
  <text x="654" y="514" class="ebody">연구자 여러분의 많은 관심과 참여 부탁드립니다.</text>
  <text x="654" y="552" class="ebody">· 초록 제출 마감: 2026년 6월 30일(월) 18:00</text>
  <text x="654" y="576" class="ebody">· 정식 논문 마감: 2026년 8월 15일(금)</text>
  <text x="654" y="600" class="ebody">· 발표 분야: 자연어처리, 컴퓨터비전, 데이터마이닝 외</text>
  <text x="654" y="624" class="ebody">· 우수 논문은 학회지 특별호 게재 기회를 드립니다.</text>
  <text x="654" y="662" class="ebody">제출은 아래 온라인 시스템에서 진행해 주시기 바랍니다.</text>
  <text x="654" y="686" class="ebody">감사합니다.</text>
  <g filter="url(#shadow)"><rect x="654" y="716" width="190" height="36" rx="10" fill="url(#brand)"/></g>
  <text x="749" y="739" text-anchor="middle" class="btnp" font-size="12">논문 제출 시스템 바로가기</text>
  <text x="654" y="788" class="efield">첨부 2개 · 논문양식_LaTeX.zip · 논문양식_HWP.zip</text>
</svg>
