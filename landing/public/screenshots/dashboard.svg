<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Pretendard, 'Segoe UI', 'Malgun Gothic', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f7"/>
      <stop offset="1" stop-color="#eef1f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.9" cy="-0.1" r="0.7">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.16"/>
      <stop offset="0.65" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fbfcff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="barfill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .name{font-size:15px;font-weight:800;fill:#0f172a}
      .sub{font-size:11px;fill:#64748b}
      .nav{font-size:13px;font-weight:700;fill:#64748b}
      .h1{font-size:30px;font-weight:800;fill:#0f172a}
      .lead{font-size:13px;fill:#64748b}
      .ctitle{font-size:14px;font-weight:800;fill:#0f172a}
      .daydate{font-size:16px;font-weight:800;fill:#0f172a}
      .count{font-size:11px;fill:#64748b}
      .item{font-size:12.5px;fill:#0f172a}
      .muted{font-size:12px;fill:#64748b}
      .btnp{font-size:12.5px;font-weight:800;fill:#ffffff}
      .btns{font-size:12.5px;font-weight:800;fill:#0f172a}
      .badge{font-size:10.5px;font-weight:700;fill:#b45309}
      .bullet{fill:#4f46e5}
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>

  <!-- Topbar -->
  <g filter="url(#shadow)">
    <rect x="24" y="20" width="1232" height="60" rx="22" fill="url(#card)" stroke="#e7ebf3"/>
  </g>
  <rect x="44" y="29" width="42" height="42" rx="14" fill="url(#brand)"/>
  <text x="65" y="56" text-anchor="middle" font-size="20" font-weight="900" fill="#ffffff">W</text>
  <text x="98" y="45" class="name">웹메일 요약</text>
  <text x="98" y="63" class="sub">로컬 메일 아카이브 + Obsidian 내보내기</text>
  <!-- nav -->
  <rect x="906" y="38" width="76" height="26" rx="9" fill="#eef0ff" stroke="#e0e3ff"/>
  <text x="944" y="55" text-anchor="middle" font-size="13" font-weight="800" fill="#4f46e5">대시보드</text>
  <text x="1010" y="55" class="nav">설정</text>
  <text x="1060" y="55" class="nav">개발자정보</text>
  <text x="1158" y="55" class="nav">English</text>
  <rect x="1136" y="40" width="22" height="22" rx="7" fill="none"/>

  <!-- Hero -->
  <text x="44" y="132" class="h1">받은메일함, 정리된 형태로.</text>
  <text x="44" y="160" class="lead">동기화 → 원문 아카이브 → 메일별 요약 → 날짜별 개요 갱신 → Obsidian 내보내기</text>

  <!-- version pill + action buttons (right) -->
  <rect x="784" y="110" width="86" height="30" rx="10" fill="#ffffff" stroke="#e7ebf3"/>
  <text x="827" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b">v0.6.8.0</text>
  <g filter="url(#shadow)"><rect x="882" y="108" width="104" height="34" rx="12" fill="url(#brand)"/></g>
  <text x="934" y="130" text-anchor="middle" class="btnp">동기화 시작</text>
  <rect x="998" y="108" width="170" height="34" rx="12" fill="#ffffff" stroke="#e7ebf3"/>
  <text x="1083" y="130" text-anchor="middle" class="btns">선택 날짜 전체 다시 요약</text>
  <rect x="1180" y="108" width="76" height="34" rx="12" fill="#ffffff" stroke="#e7ebf3"/>
  <text x="1218" y="130" text-anchor="middle" class="btns">설정</text>

  <!-- Progress card -->
  <g filter="url(#shadow)"><rect x="24" y="186" width="1232" height="92" rx="26" fill="url(#card)" stroke="#e7ebf3"/></g>
  <text x="48" y="216" class="ctitle">동기화 진행률</text>
  <rect x="48" y="228" width="860" height="12" rx="6" fill="#e9edf6"/>
  <rect x="48" y="228" width="860" height="12" rx="6" fill="url(#barfill)"/>
  <text x="48" y="262" class="muted">동기화 완료 · 42건 처리 · 1분 12초 (42/42, 100%)</text>
  <!-- stepper -->
  <g>
    <circle cx="980" cy="228" r="16" fill="#4f46e5"/><text x="980" y="233" text-anchor="middle" font-size="11" font-weight="900" fill="#fff">A</text>
    <text x="980" y="262" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0f172a">백업</text>
    <line x1="996" y1="228" x2="1084" y2="228" stroke="#4f46e5" stroke-width="2"/>
    <circle cx="1100" cy="228" r="16" fill="#4f46e5"/><text x="1100" y="233" text-anchor="middle" font-size="10" font-weight="900" fill="#fff">AI</text>
    <text x="1100" y="262" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0f172a">요약</text>
    <line x1="1116" y1="228" x2="1204" y2="228" stroke="#4f46e5" stroke-width="2"/>
    <circle cx="1220" cy="228" r="16" fill="#4f46e5"/><text x="1220" y="233" text-anchor="middle" font-size="11" font-weight="900" fill="#fff">O</text>
    <text x="1220" y="262" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0f172a">Obsidian</text>
  </g>

  <!-- Day cards -->
  <!-- card 1 -->
  <g filter="url(#shadow)"><rect x="24" y="300" width="394" height="250" rx="28" fill="url(#card)" stroke="#e7ebf3"/></g>
  <rect x="46" y="322" width="17" height="17" rx="5" fill="#fff" stroke="#cbd5e1"/>
  <text x="76" y="340" class="daydate">2026-06-22 (월)</text>
  <text x="394" y="338" text-anchor="end" class="count">18건</text>
  <g class="item">
    <text class="bullet" x="46" y="372">•</text><text x="60" y="372" class="item">9월 정기 학술대회 논문 초록 마감은 6/30</text>
    <text class="bullet" x="46" y="400">•</text><text x="60" y="400" class="item">법인카드 6월 사용내역 확인 요청 (회신 필요)</text>
    <text class="bullet" x="46" y="428">•</text><text x="60" y="428" class="item">GitHub 빌드 3건 성공, 1건 재시도 권고</text>
    <text class="bullet" x="46" y="456">•</text><text x="60" y="456" class="item">주간 업무보고 양식 변경 안내 도착</text>
    <text class="bullet" x="46" y="484">•</text><text x="60" y="484" class="item">사내 보안교육 이수 마감 7/05까지</text>
  </g>

  <!-- card 2 -->
  <g filter="url(#shadow)"><rect x="442" y="300" width="394" height="250" rx="28" fill="url(#card)" stroke="#e7ebf3"/></g>
  <rect x="464" y="322" width="17" height="17" rx="5" fill="#fff" stroke="#cbd5e1"/>
  <text x="494" y="340" class="daydate">2026-06-21 (일)</text>
  <text x="812" y="334" text-anchor="end" class="count">7건</text>
  <rect x="726" y="344" width="86" height="20" rx="10" fill="#fff7ed" stroke="#fdba74"/>
  <text x="769" y="358" text-anchor="middle" class="badge">오류 요약 1건</text>
  <g>
    <text class="bullet" x="464" y="390">•</text><text x="478" y="390" class="item">클라우드 사용량 임계치 80% 도달 알림</text>
    <text class="bullet" x="464" y="418">•</text><text x="478" y="418" class="item">도서관 대출 도서 2권 반납 예정일 6/24</text>
    <text class="bullet" x="464" y="446">•</text><text x="478" y="446" class="item">뉴스레터: 이번 주 AI 업계 주요 소식 5선</text>
    <text class="bullet" x="464" y="474">•</text><text x="478" y="474" class="item">정기 구독 결제 영수증 (6월분) 발행</text>
  </g>

  <!-- card 3 -->
  <g filter="url(#shadow)"><rect x="860" y="300" width="394" height="250" rx="28" fill="url(#card)" stroke="#e7ebf3"/></g>
  <rect x="882" y="322" width="17" height="17" rx="5" fill="#fff" stroke="#cbd5e1"/>
  <text x="912" y="340" class="daydate">2026-06-20 (금)</text>
  <text x="1230" y="338" text-anchor="end" class="count">23건</text>
  <g>
    <text class="bullet" x="882" y="372">•</text><text x="896" y="372" class="item">팀 회식 일정 투표 마감 임박 (오늘 18시)</text>
    <text class="bullet" x="882" y="400">•</text><text x="896" y="400" class="item">계약서 서명본 회신 완료 확인</text>
    <text class="bullet" x="882" y="428">•</text><text x="896" y="428" class="item">분기 KPI 리뷰 미팅 자료 공유</text>
    <text class="bullet" x="882" y="456">•</text><text x="896" y="456" class="item">비밀번호 만료 7일 전 변경 안내</text>
    <text class="bullet" x="882" y="484">•</text><text x="896" y="484" class="item">출장 정산 결재 승인 완료</text>
  </g>

  <!-- peek of next row -->
  <g opacity="0.55" filter="url(#shadow)"><rect x="24" y="566" width="394" height="120" rx="28" fill="url(#card)" stroke="#e7ebf3"/></g>
  <g opacity="0.55" filter="url(#shadow)"><rect x="442" y="566" width="394" height="120" rx="28" fill="url(#card)" stroke="#e7ebf3"/></g>
  <g opacity="0.55" filter="url(#shadow)"><rect x="860" y="566" width="394" height="120" rx="28" fill="url(#card)" stroke="#e7ebf3"/></g>
  <text x="76" y="606" class="daydate" opacity="0.5">2026-06-19 (목)</text>
  <text x="494" y="606" class="daydate" opacity="0.5">2026-06-18 (수)</text>
  <text x="912" y="606" class="daydate" opacity="0.5">2026-06-17 (화)</text>
</svg>
